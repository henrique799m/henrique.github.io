<!DOCTYPE html>
<html>

<head>

<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #0a0015, #000000);
}

/* estrelas */

.stars{
position:fixed;
top:0;
left:0;
width:1px;
height:1px;
background:transparent;
box-shadow:
100px 200px white, 200px 500px white, 300px 100px white, 400px 800px white,
500px 300px white, 600px 600px white, 700px 150px white, 800px 900px white,
900px 400px white, 1000px 700px white, 1100px 250px white, 1200px 850px white,
1300px 500px white, 1400px 200px white, 1500px 750px white, 1600px 350px white,
1700px 600px white, 1800px 150px white, 1900px 900px white, 200px 1000px white,
400px 1100px white, 600px 1200px white, 800px 1300px white, 1000px 1400px white,
1200px 1500px white, 1400px 1600px white, 1600px 1700px white, 1800px 1800px white;
animation: starsMove 120s linear infinite;
}

.stars:after{
content:"";
position:absolute;
top:2000px;
width:1px;
height:1px;
background:transparent;
box-shadow:inherit;
}

@keyframes starsMove{
from{
transform:translateY(0);
}
to{
transform:translateY(-2000px);
}
}

/* card */

.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
}

.link:hover{
background:white;
color:black;
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="#">Instagram</a>
<a class="link" href="#">Discord</a>

</div>

</body>

</html>
